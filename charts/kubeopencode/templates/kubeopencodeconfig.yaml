{{- if .Values.kubeopencodeConfig.create }}
apiVersion: kubeopencode.io/v1alpha1
kind: KubeOpenCodeConfig
metadata:
  name: cluster  # Singleton name following OpenShift convention
  labels:
    {{- include "kubeopencode.labels" . | nindent 4 }}
spec:
  {{- if .Values.kubeopencodeConfig.clusterDomain }}
  clusterDomain: {{ .Values.kubeopencodeConfig.clusterDomain | quote }}
  {{- end }}
  {{- if .Values.kubeopencodeConfig.systemImage }}
  systemImage:
    {{- if .Values.kubeopencodeConfig.systemImage.image }}
    image: {{ .Values.kubeopencodeConfig.systemImage.image | quote }}
    {{- end }}
    {{- if .Values.kubeopencodeConfig.systemImage.imagePullPolicy }}
    imagePullPolicy: {{ .Values.kubeopencodeConfig.systemImage.imagePullPolicy }}
    {{- end }}
  {{- end }}
  {{- if .Values.kubeopencodeConfig.observability }}
  observability:
    {{- if .Values.kubeopencodeConfig.observability.openTelemetry }}
    openTelemetry:
      enabled: {{ .Values.kubeopencodeConfig.observability.openTelemetry.enabled }}
      {{- if .Values.kubeopencodeConfig.observability.openTelemetry.endpoint }}
      endpoint: {{ .Values.kubeopencodeConfig.observability.openTelemetry.endpoint | quote }}
      {{- end }}
      {{- if .Values.kubeopencodeConfig.observability.openTelemetry.headers }}
      headers:
        {{- range $name, $source := .Values.kubeopencodeConfig.observability.openTelemetry.headers }}
        {{ $name }}:
          {{- if $source.value }}
          value: {{ $source.value | quote }}
          {{- end }}
          {{- if $source.valueFrom }}
          valueFrom:
            {{- if $source.valueFrom.secretKeyRef }}
            secretKeyRef:
              name: {{ $source.valueFrom.secretKeyRef.name | quote }}
              key: {{ $source.valueFrom.secretKeyRef.key | quote }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- if .Values.kubeopencodeConfig.observability.openTelemetry.enableLLMTraces }}
      enableLLMTraces: true
      {{- end }}
      {{- if .Values.kubeopencodeConfig.observability.openTelemetry.recordContent }}
      recordContent: true
      {{- end }}
      {{- if .Values.kubeopencodeConfig.observability.openTelemetry.resourceAttributes }}
      resourceAttributes:
        {{- range $key, $value := .Values.kubeopencodeConfig.observability.openTelemetry.resourceAttributes }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
