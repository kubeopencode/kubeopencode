# Minimal Agent for local testing
#
# Lightweight agent without persistence — session data and workspace
# files use ephemeral storage and are lost on pod restarts.
#
# Features demonstrated:
#   - templateRef: inherits shared config from AgentTemplate
#   - No persistence, no idle timeout
#
apiVersion: kubeopencode.io/v1alpha1
kind: Agent
metadata:
  name: dev-agent
spec:
  # Inherit shared configuration from AgentTemplate
  templateRef:
    name: local-dev-base
  profile: "Lightweight development agent (no persistence)"
  # Required fields (also in template, but required on Agent)
  executorImage: quay.io/kubeopencode/kubeopencode-agent-devbox:latest
  workspaceDir: /workspace
  serviceAccountName: kubeopencode-agent
  # Mount OpenCode API credentials (overrides template to demonstrate override)
  credentials:
    - name: opencode
      secretRef:
        name: opencode-credentials
